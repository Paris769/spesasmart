name: Scraper prezzi

on:
  schedule:
    # Ogni notte alle 03:00 CET (02:00 UTC)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      chain:
        description: "Chain da scrapare"
        required: false
        default: "all"
        type: choice
        options: [all, esselunga, conad, carrefour, eurospin, iper, famila, cosicomodo, images, dedup, prune]
      dry_run:
        description: "Dry run (non scrive nel DB)"
        required: false
        default: "false"
        type: boolean
      discover_only:
        description: "Solo discovery negozi"
        required: false
        default: "false"
        type: boolean

jobs:
  scrape:
    name: Scrape ${{ inputs.chain || 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraping/requirements.txt

      - name: Installa dipendenze scraper
        run: pip install -r scraping/requirements.txt

      - name: Esegui scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          CHAIN="${{ inputs.chain || 'all' }}"
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          if [ "${{ inputs.discover_only }}" = "true" ]; then FLAGS="$FLAGS --discover-only"; fi
          python -m scraping.runner --chain "$CHAIN" $FLAGS

      - name: Notifica fallimento
        if: failure()
        run: |
          echo "::error::Scraper fallito — controlla i log sopra"
