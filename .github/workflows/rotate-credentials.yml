name: Rotazione credenziali DB

# Ruota la password del DB Supabase (via Management API) e propaga la nuova
# DATABASE_URL a GitHub Actions e Render, con deploy. Vedi
# scripts/rotate_db_credentials.py e la skill db-credential-sync.

on:
  schedule:
    # 03:30 UTC del 1 di ogni mese. Finestra "morta" scelta per NON collidere con
    # gli altri workflow che usano lo stesso DATABASE_URL (una connessione attiva
    # con la vecchia password riceverebbe 28P01 durante la rotazione):
    #   - scraper.yml     02:00 UTC
    #   - cosicomodo.yml  04:30 UTC
    #   - guardian.yml    ogni 6h (00/06/12/18 UTC)
    # Le 03:30 sono dopo lo scraper e prima di cosicomodo/guardian.
    - cron: "30 3 1 * *"
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Propaga senza far ripartire il deploy Render"
        required: false
        default: "false"
        type: boolean
      dry_run:
        description: "Dry run (non cambia nulla)"
        required: false
        default: "false"
        type: boolean

# Mai due rotazioni in parallelo.
concurrency:
  group: rotate-db
  cancel-in-progress: false

jobs:
  rotate:
    name: Ruota e propaga DATABASE_URL
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa asyncpg
        run: pip install asyncpg

      - name: Ruota credenziali DB
        env:
          # PAT Supabase (Bearer per la Management API). Secret del repo.
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
          # Render API key + service id per env-var e deploy.
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          # `gh secret set` deve poter SCRIVERE gli Actions secrets: il GITHUB_TOKEN
          # automatico NON ha questo permesso. Serve un PAT fine-grained con
          # "Secrets: write" sul repo, salvato come secret SECRETS_WRITE_PAT.
          GH_TOKEN: ${{ secrets.SECRETS_WRITE_PAT }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          FLAGS=""
          if [ "${{ inputs.skip_deploy }}" = "true" ]; then FLAGS="$FLAGS --skip-deploy"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          python scripts/rotate_db_credentials.py $FLAGS

      - name: Notifica fallimento
        if: failure()
        run: |
          echo "::error::Rotazione credenziali fallita. Se la password e' stata gia'"
          echo "::error::cambiata sul DB, la nuova DSN e' in .db_url.local nel runner"
          echo "::error::(non persistito): rilanciare in locale scripts/sync_db_url.py."
